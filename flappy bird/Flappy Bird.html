<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Bird Clone with Falling Stars</title>
<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:url('k.jpg') no-repeat center center fixed; /* Fullscreen background image */
    background-size:cover;
}

/* Sky layers (parallax) */
.sky-layer{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-repeat:repeat-x;
    background-position:0 0;
    background-size:50% auto;
    z-index:0;
}

/* Different speeds for parallax */
#layerA{background-image:url('r.png'); z-index:1;}
#layerB{background-image:url('ra.png'); z-index:2;}

/* Score Display */
#score{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:32px;
    font-weight:bold;
    color:#fff;
    text-shadow:2px 2px 6px #000;
    z-index:10;
}

/* Game Over */
#gameOver{
    position:absolute;
    display:none;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:rgb(255, 0, 0);
    z-index:10;
    font-size: 60px;
}
button{
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:5px;
    background:#ff9800;
    cursor:pointer;
}
button:hover{
    background:#e68900;
}

/* Canvas */
canvas{
    position:absolute;
    top:0;
    left:0;
    z-index:5;
}

/* Bird Image with lighting/glow */
#birdImg{
    position:absolute;
    width:100px;
    height:100px;
    border-radius:50%;
    z-index:8;
    pointer-events:none;
    box-shadow: 0 0 20px 5px rgb(0, 255, 76);
    transition: transform 0.1s;
}
</style>
</head>
<body>

<div id="score">0</div>
<div id="gameOver">
    <h1>Game Over</h1>
    <button onclick="restart()">Restart</button>
</div>

<!-- Sky layers -->
<div id="layerA" class="sky-layer"></div>
<div id="layerB" class="sky-layer"></div>

<img src="m.jpeg" id="birdImg">

<canvas id="game"></canvas>

<script src="funtion.js"> </script>

</body>

</html>
